name: CI
on:
  push:
    branches: [main]
env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE: ${{ github.event.repository.name }}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: |
          uv sync --dev
          uv pip install pytest pytest-asyncio httpx
      - name: Unit tests
        run: uv run pytest tests/ -v
        env:
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          SMTP_FROM_ADDRESS: test@example.com
          SMTP_START_TLS: 'false'
          SMTP_USE_TLS: 'false'
          IMAP_HOST: localhost
          IMAP_PORT: '1143'
          IMAP_USE_SSL: 'false'
          AUTH_MODE: none

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push
        run: |
          TAG=${GITHUB_REF_NAME}_${GITHUB_SHA::8}
          docker buildx build \
            -t $REGISTRY/$IMAGE:$TAG \
            -t $REGISTRY/$IMAGE:latest \
            --push .

  updategitops:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Update GitOps repo
        run: |
          TAG=${GITHUB_REF_NAME}_${GITHUB_SHA::8}
          git clone https://${{ secrets.REGISTRY_PASSWORD }}@github.com/speedrun-ventures/gitops.git
          cd gitops/cluster-dev/mcp-email-server
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          ./kustomize edit set image image_mcp_email_server=$REGISTRY/$IMAGE:$TAG
          rm kustomize

          git config user.name "ci-bot"
          git config user.email "ci@bot"
          git commit -am "Update mcp-email-server image to $TAG"
          git push
